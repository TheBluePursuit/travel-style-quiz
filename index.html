/* ── SCORING ── */
function computeScores(){
  const totals={},maxP={};
  CATS.forEach(c=>{totals[c.id]=0;maxP[c.id]=0;});
  Qs.forEach(q=>{
    const ans=state.answers[q.id];
    if(ans===undefined||ans===null)return;
    if(q.type==="slider_grid"){
      q.items.forEach((item,i)=>{
        const v=ans[i]!==undefined?ans[i]:3;
        Object.entries(item.weights).forEach(([cat,w])=>{totals[cat]+=v*w;maxP[cat]+=5*w;});
      });
    }else if(q.type==="card_select"){
      const opt=q.options[ans];
      if(opt)Object.entries(opt.weights).forEach(([cat,w])=>{totals[cat]+=w*4;maxP[cat]+=6*4;});
    }else if(q.type==="forced_choice"){
      q.pairs.forEach((pair,pi)=>{
        const sel=ans[pi],opt=sel===0?pair.a:sel===1?pair.b:null;
        if(opt)Object.entries(opt.weights).forEach(([cat,w])=>{totals[cat]+=w*3;maxP[cat]+=5*3;});
      });
    }else if(q.type==="pill_select"){
      ans.forEach(idx=>{
        const opt=q.options[idx];
        if(opt)Object.entries(opt.weights).forEach(([cat,w])=>{totals[cat]+=w*3;maxP[cat]+=6*3;});
      });
    }else if(q.type==="tap_rank"){
      ans.forEach((itemIdx,rank)=>{
        const item=q.items[itemIdx],bonus=q.rankBonus[rank]||0.5;
        Object.entries(item.catWeights).forEach(([cat,w])=>{totals[cat]+=w*bonus*10;maxP[cat]+=5*10;});
      });
    }
  });
  const result={};
  CATS.forEach(c=>{result[c.id]=Math.min(100,Math.round((totals[c.id]/(maxP[c.id]||1))*100));});
  return result;
}

function canContinue(){
  const q=Qs[state.qIdx],ans=state.answers[q.id];
  if(q.type==="card_select")return ans!==null&&ans!==undefined;
  if(q.type==="pill_select")return Array.isArray(ans)&&ans.length>0;
  if(q.type==="tap_rank")return Array.isArray(ans)&&ans.length>=3;
  return true;
}

function advance(){
  if(!canContinue())return;
  if(state.qIdx<Qs.length-1){setState({qIdx:state.qIdx+1});}
  else{const scores=computeScores();setState({screen:"results",scores});}
}
function goBack(){if(state.qIdx>0)setState({qIdx:state.qIdx-1});}

/* ── EMAIL ── */
async function sendEmail(){
  const{emailName,emailAddr,scores}=state;
  if(!emailName.trim()||!emailAddr.trim())return;
  setState({emailStatus:"sending"});
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const top5=sorted.slice(0,5);
  const topIds=top5.map(e=>e[0]);
  const profile=PROFILES[sorted[0][0]]||PROFILES.relaxation;
  const dests=[...new Set(topIds.flatMap(id=>DESTINATIONS[id]||[]))].slice(0,5);
  const stls=[...new Set(topIds.flatMap(id=>STYLES[id]||[]))].slice(0,4);
  const blogs=BLOGS.filter(b=>b.cats.some(c=>topIds.includes(c))).slice(0,3);
  const top5Text=top5.map(([id,pct])=>{const cat=CATS.find(c=>c.id===id);return cat.label+": "+pct+"%";}).join("\n");
  const blogsText=blogs.map(b=>b.title+": "+b.url).join("\n");
  try{
    await emailjs.send(EJS_SERVICE,EJS_TEMPLATE,{
      to_email:emailAddr,to_name:emailName,
      bcc_email:"nicole.banks@fora.travel",
      profile_name:profile.name,profile_desc:profile.desc,
      top5_scores:top5Text,destinations:dests.join(", "),
      travel_styles:stls.join(", "),blog_links:blogsText,
      booking_url:"https://wix.to/w5VJ9sa",
    });
    setState({emailStatus:"sent"});
  }catch(e){setState({emailStatus:"error"});}
}

/* ── RENDER HELPERS ── */
function setBg(url,overlayOpacity){
  document.getElementById("bgEl").style.backgroundImage=`url(${url})`;
  document.getElementById("overlayEl").style.background=`rgba(8,18,28,${overlayOpacity})`;
}

/* ── RENDER ── */
function render(){
  const app=document.getElementById("app");
  const{screen,qIdx,scores,emailName,emailAddr,emailStatus}=state;

  if(screen==="intro"){
    setBg(QUIZ_BG[0],0.72);
    app.innerHTML=`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;max-width:500px;margin:0 auto;">
      <p class="eyebrow" style="margin-bottom:20px;">The Blue Pursuit</p>
      <h1 class="serif" style="font-size:clamp(38px,9vw,58px);font-weight:300;line-height:1.1;color:#F5F1EA;margin-bottom:20px;">
        Discover Your<br/><em style="color:#d4b882;font-style:italic;">Travel Style</em>
      </h1>
      <div class="divider" style="margin-bottom:28px;"></div>
      <p style="color:rgba(245,241,234,.62);font-size:15px;line-height:1.85;margin-bottom:14px;">
        This isn't a quiz. It's a personalized travel assessment that reveals the destinations, experiences, and travel styles that genuinely match who you are.
      </p>
      <p style="color:rgba(245,241,234,.35);font-size:11px;letter-spacing:.08em;margin-bottom:44px;">
        12 QUESTIONS &nbsp;·&nbsp; 5–8 MINUTES &nbsp;·&nbsp; TAILORED TO YOU
      </p>
      <button class="gold-btn" onclick="startQuiz()" style="padding:17px 52px;font-size:14px;">Begin Your Assessment</button>
    </div>`;
    return;
  }

  if(screen==="quiz"){
    const q=Qs[qIdx];
    setBg(QUIZ_BG[qIdx%QUIZ_BG.length],0.75);
    const progress=(qIdx/Qs.length)*100;
    const ans=state.answers[q.id];
    const ok=canContinue();

    let qHTML="";
    if(q.type==="slider_grid"){
      const vals=ans||{};
      qHTML=q.items.map((item,i)=>`
        <div class="card" style="padding:14px 16px;margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span style="color:#F5F1EA;font-size:13px;line-height:1.45;flex:1;padding-right:12px;">${item.label}</span>
            <span class="serif" style="color:#C1A16B;font-size:24px;font-weight:600;" id="sv${q.id}_${i}">${vals[i]!==undefined?vals[i]:3}</span>
          </div>
          <input type="range" min="1" max="5" step="1" value="${vals[i]!==undefined?vals[i]:3}"

            style="width:100%;accent-color:#C1A16B;"/>

            <span style="color:rgba(245,241,234,.3);font-size:10px;">Not at all</span>
            <span style="color:rgba(245,241,234,.3);font-size:10px;">Essential</span>

        </div>`).join("");
    }else if(q.type==="card_select"){
      qHTML=`<div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">

        <button onclick="selectCard(${q.id},${i})" style="background:${ans===i?"rgba(193,161,107,0.18)":"rgba(11,31,46,0.72)"};border:${ans===i?"2px solid #C1A16B":"1px solid rgba(193,161,107,0.18)"};border-radius:14px;padding:16px 12px;cursor:pointer;text-align:left;backdrop-filter:blur(8px);transition:all .2s;">

        </button>`).join("")}
      </div>`;
    }else if(q.type==="forced_choice"){
      const sels=ans||{};
      qHTML=q.pairs.map((pair,pi)=>`
        <div style="display:grid;grid-template-columns:1fr 48px 1fr;gap:8px;align-items:center;margin-bottom:12px;">
          <button onclick="selectForced(${q.id},${pi},0)" style="background:${sels[pi]===0?"rgba(193,161,107,0.18)":"rgba(11,31,46,0.72)"};border:${sels[pi]===0?"2px solid #C1A16B":"1px solid rgba(193,161,107,0.18)"};border-radius:12px;padding:14px 10px;cursor:pointer;text-align:center;backdrop-filter:blur(8px);transition:all .2s;">
            <div style="color:${sels[pi]===0?"#C1A16B":"#F5F1EA"};font-family:'Nobile',sans-serif;font-size:13px;font-weight:${sels[pi]===0?700:400};">${pair.a.label}</div>
          </button>
          <div class="serif" style="color:rgba(245,241,234,.28);font-size:14px;text-align:center;font-style:italic;">or</div>
          <button onclick="selectForced(${q.id},${pi},1)" style="background:${sels[pi]===1?"rgba(193,161,107,0.18)":"rgba(11,31,46,0.72)"};border:${sels[pi]===1?"2px solid #C1A16B":"1px solid rgba(193,161,107,0.18)"};border-radius:12px;padding:14px 10px;cursor:pointer;text-align:center;backdrop-filter:blur(8px);transition:all .2s;">
            <div style="color:${sels[pi]===1?"#C1A16B":"#F5F1EA"};font-family:'Nobile',sans-serif;font-size:13px;font-weight:${sels[pi]===1?700:400};">${pair.b.label}</div>
          </button>
        </div>`).join("");
    }else if(q.type==="pill_select"){
      const sel=ans||[];
      qHTML=`<div style="display:flex;flex-wrap:wrap;gap:10px;">
        ${q.options.map((opt,i)=>`
        <button onclick="togglePill(${q.id},${i})" style="background:${sel.includes(i)?"rgba(193,161,107,0.18)":"rgba(11,31,46,0.72)"};border:${sel.includes(i)?"2px solid #C1A16B":"1px solid rgba(193,161,107,0.18)"};border-radius:50px;padding:11px 22px;cursor:pointer;color:${sel.includes(i)?"#C1A16B":"#F5F1EA"};font-family:'Nobile',sans-serif;font-size:13px;font-weight:${sel.includes(i)?600:400};backdrop-filter:blur(8px);transition:all .2s;">
          ${opt.label}
        </button>`).join("")}
      </div>`;
    }else if(q.type==="tap_rank"){
      const ranked=ans||[];
      const remaining=q.items.map((_,i)=>i).filter(i=>!ranked.includes(i));
      qHTML=`
        ${remaining.length>0?`
        <p style="color:#d4b882;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;">Tap to rank</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
          ${remaining.map(i=>`<button onclick="tapRank(${q.id},${i})" style="background:rgba(11,31,46,0.72);border:1px solid rgba(193,161,107,0.18);border-radius:50px;padding:11px 22px;cursor:pointer;color:#F5F1EA;font-family:'Nobile',sans-serif;font-size:13px;backdrop-filter:blur(8px);">${q.items[i].label}</button>`).join("")}
        </div>`:""}
        ${ranked.length>0?`
        <p style="color:#d4b882;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;">Your ranking</p>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
          ${ranked.map((idx,rank)=>`
          <div style="display:flex;align-items:center;gap:14px;background:rgba(193,161,107,0.10);border:1px solid rgba(193,161,107,0.25);border-radius:10px;padding:10px 16px;">
            <span class="serif" style="color:#C1A16B;font-size:18px;font-weight:600;min-width:22px;">${rank+1}</span>
            <span style="color:#F5F1EA;font-size:13px;">${q.items[idx].label}</span>

        </div>
        <button onclick="resetRank(${q.id})" class="outline-btn" style="padding:7px 16px;font-size:12px;">Reset ranking</button>`:""}`;
    }

    app.innerHTML=`
    <div style="position:fixed;top:0;left:0;right:0;z-index:10;background:rgba(8,18,28,.80);backdrop-filter:blur(14px);border-bottom:1px solid rgba(193,161,107,0.18);">
      <div style="max-width:580px;margin:0 auto;padding:13px 20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span class="eyebrow" style="font-size:10px;">The Blue Pursuit</span>
          <span style="color:rgba(245,241,234,.4);font-size:11px;">${qIdx+1} of ${Qs.length}</span>
        </div>
        <div style="background:rgba(245,241,234,.10);border-radius:3px;height:2px;overflow:hidden;">
          <div style="background:linear-gradient(90deg,#C1A16B,#d4b882);height:100%;border-radius:3px;width:${progress}%;transition:width .4s ease;"></div>
        </div>
      </div>
    </div>
    <div style="width:100%;max-width:560px;padding:86px 20px 110px;">
      <h2 class="serif" style="font-size:clamp(22px,5.5vw,34px);font-weight:300;line-height:1.25;margin-bottom:8px;color:#F5F1EA;">${q.question}</h2>
      ${q.sub?`<p style="color:rgba(245,241,234,.62);font-size:12px;letter-spacing:.03em;margin-bottom:26px;">${q.sub}</p>`:""}
      ${qHTML}
    </div>
    <div style="position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(8,18,28,.90);backdrop-filter:blur(14px);border-top:1px solid rgba(193,161,107,0.18);padding:16px 20px;">
      <div style="max-width:560px;margin:0 auto;display:flex;gap:10px;">

          ${qIdx===Qs.length-1?"View My Results":"Continue"}
        </button>
      </div>
    </div>`;
    return;
  }

  if(screen==="results"){
    const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const topId=sorted[0][0];
    const top5=sorted.slice(0,5);
    const topIds=top5.map(e=>e[0]);
    const profile=PROFILES[topId]||PROFILES.relaxation;
    const dests=[...new Set(topIds.flatMap(id=>DESTINATIONS[id]||[]))].slice(0,5);
    const stls=[...new Set(topIds.flatMap(id=>STYLES[id]||[]))].slice(0,4);
    const blogs=BLOGS.filter(b=>b.cats.some(c=>topIds.includes(c))).slice(0,3);
    setBg(RESULT_BG[topId]||RESULT_BG.relaxation,0.88);

    app.innerHTML=`
    <div style="width:100%;max-width:580px;padding:48px 20px 100px;margin:0 auto;">
      <p class="eyebrow" style="text-align:center;margin-bottom:12px;">Your Travel Style</p>
      <h1 class="serif" style="font-size:clamp(30px,7vw,46px);font-weight:300;text-align:center;margin-bottom:10px;color:#F5F1EA;">${profile.name}</h1>
      <div class="divider" style="margin-bottom:24px;"></div>
      <p style="color:rgba(245,241,234,.62);font-size:14px;line-height:1.85;text-align:center;margin-bottom:44px;max-width:440px;margin-left:auto;margin-right:auto;">${profile.desc}</p>

      <div class="card" style="padding:26px 22px;margin-bottom:20px;">
        <p class="serif" style="color:#d4b882;font-size:17px;text-align:center;letter-spacing:.04em;margin-bottom:22px;">Your Top Travel Styles</p>
        ${top5.map(([catId,pct],i)=>{
          const cat=CATS.find(c=>c.id===catId);
          return `<div style="margin-bottom:18px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
              <span style="color:#F5F1EA;font-size:13px;">${cat.icon} ${cat.label}</span>
              <span class="serif" style="color:#C1A16B;font-size:20px;font-weight:600;">${pct}%</span>
            </div>
            <div class="score-bar-track"><div class="score-bar-fill" id="bar_${catId}" style="transition-delay:${i*90}ms;"></div></div>
          </div>`;
        }).join("")}
      </div>

      <div class="card" style="padding:22px;margin-bottom:20px;">
        <p class="serif" style="color:#d4b882;font-size:17px;text-align:center;margin-bottom:16px;">Destinations For You</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">
          ${dests.map(d=>`<span style="background:rgba(193,161,107,0.12);border:1px solid rgba(193,161,107,0.28);border-radius:50px;padding:9px 20px;color:#F5F1EA;font-size:13px;">${d}</span>`).join("")}
        </div>
      </div>

      <div class="card" style="padding:22px;margin-bottom:20px;">
        <p class="serif" style="color:#d4b882;font-size:17px;text-align:center;margin-bottom:16px;">Travel Styles For You</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">
          ${stls.map(s=>`<span style="background:rgba(193,161,107,0.12);border:1px solid rgba(193,161,107,0.28);border-radius:50px;padding:9px 20px;color:#F5F1EA;font-size:13px;">${s}</span>`).join("")}
        </div>
      </div>

      <div class="card" style="padding:22px;margin-bottom:20px;">
        <p class="serif" style="color:#d4b882;font-size:17px;text-align:center;margin-bottom:16px;">Recommended Reading</p>
        ${blogs.map((b,i)=>`<a href="${b.url}" target="_blank" rel="noopener noreferrer" style="display:block;color:#F5F1EA;font-size:13px;line-height:1.6;padding:11px 0;border-bottom:${i<blogs.length-1?"1px solid rgba(245,241,234,.08)":"none"};text-decoration:none;">
          <span style="color:#C1A16B;margin-right:10px;">→</span>${b.title}
        </a>`).join("")}
        <div style="margin-top:18px;">
          <a href="https://www.thebluepursuit.com/blog" target="_blank" rel="noopener noreferrer" class="gold-outline-btn" style="padding:10px 24px;">Browse All Articles</a>
        </div>
      </div>

      <div class="card" style="padding:26px 22px;margin-bottom:32px;">
        <p class="serif" style="color:#d4b882;font-size:17px;text-align:center;margin-bottom:6px;">Save Your Results</p>
        <p style="color:rgba(245,241,234,.62);font-size:13px;text-align:center;margin-bottom:20px;line-height:1.6;">Enter your name and email to receive your Travel Style profile.</p>
        ${emailStatus==="sent"?
          `<p style="color:#C1A16B;font-size:14px;text-align:center;line-height:1.7;">Your results have been sent. Check your inbox.</p>`:
          `<input type="text" placeholder="Your name" value="${emailName}" oninput="setEmailName(this.value)" style="margin-bottom:10px;"/>
           <input type="email" placeholder="Your email address" value="${emailAddr}" oninput="setEmailAddr(this.value)" style="margin-bottom:16px;"/>
           <button onclick="sendEmail()" ${emailStatus==="sending"||!emailName.trim()||!emailAddr.trim()?"disabled":""} style="width:100%;background:${emailName.trim()&&emailAddr.trim()?"linear-gradient(135deg,#C1A16B,#a8864f)":"rgba(193,161,107,0.2)"};border:none;border-radius:50px;padding:14px;color:${emailName.trim()&&emailAddr.trim()?"#0B1F2E":"rgba(245,241,234,.25)"};font-family:'Nobile',sans-serif;font-size:13px;font-weight:700;cursor:${emailName.trim()&&emailAddr.trim()?"pointer":"not-allowed"};letter-spacing:.08em;text-transform:uppercase;transition:all .3s;">
             ${emailStatus==="sending"?"Sending...":"Send My Results"}
           </button>
           ${emailStatus==="error"?`<p style="color:#e07070;font-size:12px;text-align:center;margin-top:10px;">Something went wrong. Please try again.</p>`:""}`
        }
      </div>

      <div style="text-align:center;">
        <p class="serif" style="color:#F5F1EA;font-size:clamp(20px,4.5vw,26px);font-style:italic;font-weight:300;line-height:1.4;margin-bottom:10px;">
          Ready to turn these results<br/>into your next vacation?
        </p>
        <p style="color:rgba(245,241,234,.62);font-size:13px;margin-bottom:30px;">Let's build a trip as unique as your travel style.</p>
        <a href="https://wix.to/w5VJ9sa" target="_blank" rel="noopener noreferrer" class="gold-btn" style="padding:18px 44px;font-size:14px;display:inline-block;text-decoration:none;">Schedule a Complimentary Consultation</a>
        <div style="margin-top:22px;">
          <button class="outline-btn" onclick="retake()" style="padding:10px 26px;font-size:12px;letter-spacing:.06em;">Retake Assessment</button>
        </div>
      </div>
    </div>`;

    setTimeout(()=>{
      top5.forEach(([catId,pct])=>{
        const el=document.getElementById("bar_"+catId);
        if(el)el.style.width=pct+"%";
      });
    },100);
    return;
  }
}

/* ── GLOBAL HANDLERS ── */
window.startQuiz=()=>setState({screen:"quiz",qIdx:0});
window.advance=advance;
window.goBack=goBack;
window.retake=()=>setState({screen:"intro",qIdx:0,answers:{},scores:{},emailName:"",emailAddr:"",emailStatus:"idle"});

window.setSlider=(qId,i,val)=>{
  const cur=state.answers[qId]||{};
  setState({answers:{...state.answers,[qId]:{...cur,[i]:parseInt(val)}}});
  const el=document.getElementById(`sv${qId}_${i}`);
  if(el)el.textContent=val;
};
window.selectCard=(qId,i)=>setState({answers:{...state.answers,[qId]:i}});
window.selectForced=(qId,pi,oi)=>{
  const cur=state.answers[qId]||{};
  setState({answers:{...state.answers,[qId]:{...cur,[pi]:oi}}});
};
window.togglePill=(qId,i)=>{
  const cur=state.answers[qId]||[];
  setState({answers:{...state.answers,[qId]:cur.includes(i)?cur.filter(x=>x!==i):[...cur,i]}});
};
window.tapRank=(qId,i)=>{
  const cur=state.answers[qId]||[];
  if(!cur.includes(i))setState({answers:{...state.answers,[qId]:[...cur,i]}});
};
window.resetRank=(qId)=>setState({answers:{...state.answers,[qId]:[]}});
window.setEmailName=(v)=>{state.emailName=v;};
window.setEmailAddr=(v)=>{state.emailAddr=v;};
window.sendEmail=sendEmail;

/* ── PRELOAD & INIT ── */
[...QUIZ_BG,...Object.values(RESULT_BG)].forEach(u=>{const img=new Image();img.src=u;});
render();

})();
</script>
</body>
</html>
