.gold-btn{background:linear-gradient(135deg,#C1A16B,#a8864f);color:#0B1F2E;border:none;border-radius:50px;font-family:'Nobile',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .3s ease;box-shadow:0 10px 40px rgba(193,161,107,.35);}
.gold-btn:hover{transform:translateY(-1px);box-shadow:0 14px 48px rgba(193,161,107,.45);}
.outline-btn{background:transparent;border:1px solid var(--white-faint);border-radius:50px;color:var(--white-dim);font-family:'Nobile',sans-serif;cursor:pointer;transition:all .2s ease;}
.outline-btn:hover{border-color:var(--gold);color:var(--gold);}
.gold-outline-btn{background:transparent;border:1px solid var(--gold);border-radius:50px;color:var(--gold);font-family:'Nobile',sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block;}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:rgba(245,241,234,.15);border-radius:3px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 2px 8px rgba(193,161,107,.4);}
input[type=text],input[type=email]{background:rgba(245,241,234,.06);border:1px solid var(--navy-border);border-radius:8px;padding:12px 14px;color:var(--white);font-family:'Nobile',sans-serif;font-size:13px;width:100%;outline:none;transition:border .2s;}
input[type=text]:focus,input[type=email]:focus{border-color:var(--gold);}
input[type=text]::placeholder,input[type=email]::placeholder{color:rgba(245,241,234,.35);}
.score-bar-track{background:rgba(245,241,234,.10);border-radius:3px;height:5px;overflow:hidden;}
.score-bar-fill{background:linear-gradient(90deg,#C1A16B,#d4b882);height:100%;border-radius:3px;width:0%;transition:width 1.1s cubic-bezier(.4,0,.2,1);}
@media(max-width:480px){.two-col{grid-template-columns:1fr!important;}}
</style>

    if(ans===undefined||ans===null)return;
    if(q.type==="slider_grid"){
      q.items.forEach((item,i)=>{
        const v=ans[i]!==undefined?ans[i]:3;
        Object.entries(item.weights).forEach(([cat,w])=>{t[cat]+=v*w;m[cat]+=5*w;});
      });
    }else if(q.type==="card_select"){
      const opt=q.options[ans];
      if(opt)Object.entries(opt.weights).forEach(([cat,w])=>{t[cat]+=w*4;m[cat]+=6*4;});
    }else if(q.type==="forced_choice"){
      q.pairs.forEach((pair,pi)=>{
        const sel=ans[pi],opt=sel===0?pair.a:sel===1?pair.b:null;
        if(opt)Object.entries(opt.weights).forEach(([cat,w])=>{t[cat]+=w*3;m[cat]+=5*3;});
      });
    }else if(q.type==="pill_select"){
      ans.forEach(idx=>{
        const opt=q.options[idx];
        if(opt)Object.entries(opt.weights).forEach(([cat,w])=>{t[cat]+=w*3;m[cat]+=6*3;});
      });
    }else if(q.type==="tap_rank"){
      ans.forEach((itemIdx,rank)=>{
        const item=q.items[itemIdx],bonus=q.rankBonus[rank]||0.5;
        Object.entries(item.catWeights).forEach(([cat,w])=>{t[cat]+=w*bonus*10;m[cat]+=5*10;});
      });
    }
  });
  const r={};
  CATS.forEach(c=>{r[c.id]=Math.min(100,Math.round((t[c.id]/(m[c.id]||1))*100));});
  return r;
}

function canContinue(){
  const q=Qs[state.qIdx],ans=state.answers[q.id];
  if(q.type==="card_select")return ans!==null&&ans!==undefined;
  if(q.type==="pill_select")return Array.isArray(ans)&&ans.length>0;
  if(q.type==="tap_rank")return Array.isArray(ans)&&ans.length>=3;
  return true;
}

function advance(){
  if(!canContinue())return;
  if(state.qIdx<Qs.length-1){setState({qIdx:state.qIdx+1});}
  else{const scores=computeScores();setState({screen:"results",scores});}
}
function goBack(){if(state.qIdx>0)setState({qIdx:state.qIdx-1});}
